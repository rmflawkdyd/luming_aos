name: CI (Instrumented)

# 느리고 불안정한 계측(에뮬레이터) 테스트는 매 push가 아니라 PR에서만 돌린다.
on:
  pull_request:
    branches: [main]

# 같은 PR에 연달아 push하면 진행 중인 옛 실행을 취소하고 최신 것만 돌린다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-instrumented-tests:
    name: "Android 계측(UI) 테스트"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      # 하드웨어 가속(KVM)을 켜야 에뮬레이터가 실용적인 속도로 돈다.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 에뮬레이터를 부팅한 상태에서 androidTest(계측 테스트)를 실행한다.
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31          # minSdk=31 — 최소 지원 버전에서 검증
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest

      # 성공/실패와 무관하게 테스트 리포트는 항상 업로드한다.
      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/
